# ============================================================================
#  AI-Ultimate-Network — Clash Meta / Clash Verge config. GENERATED — DO NOT EDIT.
#  Rebuild: python3 scripts/build.py --target clash
#
#  SETUP: replace YOUR_AIRPORT_SUBSCRIPTION_URL below with your airport subscription
#  URL. Groups auto-select nodes from it by region regex (see docs/USAGE.md).
# ============================================================================
mixed-port: 7890
mode: rule
log-level: info
ipv6: false

# WeChat-safe DNS for TUN (ADR-0009): fake-ip, but IM/NTP/STUN domains get
# real IPs via fake-ip-filter; CN names use domestic DoH; rest falls back.
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '*.localdomain'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - '+.stun.*.*'
    - '+.stun.*.*.*'
    - 'time.*.com'
    - 'time.*.apple.com'
    - 'ntp.*.com'
    - '+.pool.ntp.org'
    - '+.qq.com'
    - '+.weixin.qq.com'
    - '+.wechat.com'
    - '+.weixinbridge.com'
    - '+.wechatapp.com'
    - '+.qpic.cn'
    - '+.qlogo.cn'
    - '+.gtimg.cn'
    - '+.tencent.com'
    - '+.dingtalk.com'
    - '+.feishu.cn'
    - '+.larksuite.com'
    - '+.163.com'
    - '+.126.net'
    - '+.netease.com'
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver: [https://doh.pub/dns-query, https://dns.alidns.com/dns-query]
  nameserver-policy:
    'geosite:cn': [https://doh.pub/dns-query, https://dns.alidns.com/dns-query]
  fallback: [https://dns.google/dns-query, https://cloudflare-dns.com/dns-query]
  fallback-filter: {geoip: true, geoip-code: CN, ipcidr: [240.0.0.0/4]}

proxy-providers:
  airport:
    type: http
    url: "YOUR_AIRPORT_SUBSCRIPTION_URL"
    interval: 3600
    path: ./providers/airport.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: Claude
    type: select
    use: [airport]
    filter: '(?i)(\bTW\b|Taiwan|台湾|台灣)'
    proxies: [Proxy]
  - name: ChatGPT
    type: select
    use: [airport]
    filter: '(?i)(\bUS\b|USA|美国|美國|\bSG\b|Singapore|新加坡|狮城|\bJP\b|Japan|日本|\bHK\b|Hong ?Kong|香港)'
    proxies: [Proxy]
  - name: GitHub
    type: select
    use: [airport]
    filter: '(?i)(\bHK\b|Hong ?Kong|香港)'
    proxies: [Proxy]
  - name: Google
    type: select
    use: [airport]
    filter: '(?i)(\bHK\b|Hong ?Kong|香港|\bJP\b|Japan|日本|\bSG\b|Singapore|新加坡|狮城|\bUS\b|USA|美国|美國)'
    proxies: [Proxy]
  - name: TikTok
    type: select
    use: [airport]
    filter: '(?i)(\bJP\b|Japan|日本|\bTW\b|Taiwan|台湾|台灣|\bSG\b|Singapore|新加坡|狮城)'
    proxies: [Proxy]
  - name: Proxy
    type: select
    use: [airport]
    filter: '.*'
  - name: Auto
    type: url-test
    use: [airport]
    filter: '.*'
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - {name: Apple, type: select, proxies: [DIRECT, Proxy]}
  - {name: Final, type: select, proxies: [Proxy, DIRECT]}

