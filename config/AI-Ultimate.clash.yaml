# ============================================================================
#  AI-Ultimate-Network — Clash Meta / Clash Verge config. GENERATED — DO NOT EDIT.
#  Rebuild: python3 scripts/build.py --target clash
#
#  SETUP: replace YOUR_AIRPORT_SUBSCRIPTION_URL below with your airport subscription
#  URL. Groups auto-select nodes from it by region regex (see docs/USAGE.md).
# ============================================================================
mixed-port: 7890
mode: rule
log-level: info
ipv6: false

proxy-providers:
  airport:
    type: http
    url: "YOUR_AIRPORT_SUBSCRIPTION_URL"
    interval: 3600
    path: ./providers/airport.yaml
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

proxy-groups:
  - name: Claude
    type: select
    use: [airport]
    filter: '(?i)(\bTW\b|Taiwan|台湾|台灣)'
    proxies: [Proxy]
  - name: ChatGPT
    type: select
    use: [airport]
    filter: '(?i)(\bUS\b|USA|美国|美國|\bSG\b|Singapore|新加坡|狮城|\bJP\b|Japan|日本|\bHK\b|Hong ?Kong|香港)'
    proxies: [Proxy]
  - name: GitHub
    type: select
    use: [airport]
    filter: '(?i)(\bHK\b|Hong ?Kong|香港)'
    proxies: [Proxy]
  - name: Google
    type: select
    use: [airport]
    filter: '(?i)(\bHK\b|Hong ?Kong|香港|\bJP\b|Japan|日本|\bSG\b|Singapore|新加坡|狮城|\bUS\b|USA|美国|美國)'
    proxies: [Proxy]
  - name: TikTok
    type: select
    use: [airport]
    filter: '(?i)(\bJP\b|Japan|日本|\bTW\b|Taiwan|台湾|台灣|\bSG\b|Singapore|新加坡|狮城)'
    proxies: [Proxy]
  - name: Proxy
    type: select
    use: [airport]
    filter: '.*'
  - name: Auto
    type: url-test
    use: [airport]
    filter: '.*'
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
  - {name: Apple, type: select, proxies: [DIRECT, Proxy]}
  - {name: Final, type: select, proxies: [Proxy, DIRECT]}

